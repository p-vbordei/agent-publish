name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun test
      - run: bun build --compile --outfile agent-publish src/index.ts
      - run: ./agent-publish || test $? -eq 64
        name: Smoke test (no-args prints usage, exits 64)
